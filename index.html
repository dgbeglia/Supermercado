<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadona Smart v38</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 p-4">
    <div id="app" class="max-w-md mx-auto"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCfifQBtUNLbUkD8r_aRZBfv7fOStpVkjo",
            authDomain: "supermercado-3e981.firebaseapp.com",
            databaseURL: "https://supermercado-3e981-default-rtdb.firebaseio.com",
            projectId: "supermercado-3e981",
            storageBucket: "supermercado-3e981.firebasestorage.app",
            messagingSenderId: "1012881433414",
            appId: "1:1012881433414:web:db2c2e235efe4862a1bb47"
        };
        firebase.initializeApp(firebaseConfig);

        const genAI = new GoogleGenerativeAI("AIzaSyC-XkdO69drkY536m2ATzm_GID3EiZ9oH8");
        let chatLogs = [{role: 'ai', text: '¡v38 funcionando en GitHub! Escribe "Hola" para probar.'}];
        let cargando = false;

        window.preguntarIA = async () => {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg || cargando) return;

            chatLogs.push({role: 'user', text: msg});
            input.value = ""; cargando = true; dibujar();

            try {
                // Ajuste de modelo para evitar el error 404 que te salía
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(msg);
                chatLogs.push({role: 'ai', text: result.response.text()});
            } catch (e) {
                chatLogs.push({role: 'ai', text: "Error de conexión. Asegúrate de que tu clave API no tenga restricciones de IP en Google Cloud."});
            }
            cargando = false; dibujar();
        };

        window.dibujar = () => {
            document.getElementById('app').innerHTML = `
                <div class="flex flex-col h-[90vh]">
                    <div class="bg-green-700 text-white p-4 rounded-3xl shadow-lg mb-4 text-center font-black uppercase italic italic tracking-tighter">Mercadona Smart v38</div>
                    <div class="flex-1 overflow-y-auto bg-white rounded-3xl p-4 shadow-inner space-y-4 mb-4 border border-gray-100 text-[11px] font-bold leading-relaxed">
                        ${chatLogs.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="${m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-800'} p-3 rounded-2xl max-w-[85%] shadow-sm">${m.text}</div></div>`).join('')}
                    </div>
                    <div class="flex gap-2 bg-white p-2 rounded-3xl border shadow-xl">
                        <input type="text" id="chat-input" class="flex-1 p-3 outline-none text-xs font-bold" placeholder="¿Hablamos?">
                        <button onclick="preguntarIA()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black shadow-md active:scale-95 transition-all">OK</button>
                    </div>
                </div>`;
        };
        window.onload = dibujar;
    </script>
</body>
</html>
