<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadona v40</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div id="app" class="max-w-md mx-auto"></div>
    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        
        // Usamos la clave que tienes activa en tu captura ...9oH8
        const genAI = new GoogleGenerativeAI("AIzaSyC-XkdO69drkY536m2ATzm_GID3EiZ9oH8");
        let chatLogs = [{role: 'ai', text: 'v40 lista. Si sale error, pulsa en la advertencia amarilla de AI Studio.'}];
        let cargando = false;

        window.preguntarIA = async () => {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg || cargando) return;
            chatLogs.push({role: 'user', text: msg});
            input.value = ""; cargando = true; dibujar();
            try {
                // Forzamos el modelo Flash que es el más permisivo
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent({
                    contents: [{ role: "user", parts: [{ text: msg }] }]
                });
                chatLogs.push({role: 'ai', text: result.response.text()});
            } catch (e) {
                chatLogs.push({role: 'ai', text: "⚠️ Bloqueo de Google. Ve a AI Studio y pulsa donde dice 'Advertencia' en tu clave."});
            }
            cargando = false; dibujar();
        };

        window.dibujar = () => {
            document.getElementById('app').innerHTML = `
                <div class="flex flex-col h-[92vh]">
                    <div class="bg-green-800 text-white p-5 rounded-3xl shadow-xl mb-4 text-center font-black uppercase italic tracking-tighter border-b-4 border-green-900">Mercadona v40</div>
                    <div class="flex-1 overflow-y-auto bg-white rounded-3xl p-4 shadow-inner space-y-4 mb-4 border border-gray-200 text-[11px] font-bold">
                        ${chatLogs.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-800'} p-3 rounded-2xl max-w-[85%] shadow-sm leading-tight">${m.text}</div></div>`).join('')}
                    </div>
                    <div class="flex gap-2 bg-white p-2 rounded-3xl border-2 border-gray-200 shadow-2xl">
                        <input type="text" id="chat-input" class="flex-1 p-3 outline-none text-xs font-bold" placeholder="Escribe algo...">
                        <button onclick="preguntarIA()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black active:scale-90 transition-all">OK</button>
                    </div>
                </div>`;
        };
        window.onload = dibujar;
    </script>
</body>
</html>
