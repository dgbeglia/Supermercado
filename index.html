<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de API Key v2</title>
</head>
<body style="font-family: sans-serif; padding: 20px; text-align: center; background: #f0f2f5;">

    <h2>Comprobador de API Key v2</h2>
    <p style="font-size: 12px; color: #666;">Corrigiendo error 404 de modelos</p>
    
    <input type="text" id="key-input" placeholder="Pega tu clave aquí" 
           style="width: 85%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
    <br>
    <button id="btn-test" style="padding: 12px 24px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold;">Probar Ahora</button>

    <div id="resultado" style="margin-top: 20px; font-weight: bold; padding: 20px; border-radius: 8px; font-size: 14px; line-height: 1.5;"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        document.getElementById('btn-test').onclick = async () => {
            const key = document.getElementById('key-input').value.trim();
            const resDiv = document.getElementById('resultado');
            
            if (!key) {
                resDiv.innerText = "⚠️ Pega la clave primero.";
                return;
            }

            resDiv.innerText = "⌛ Conectando con Google...";
            resDiv.style.backgroundColor = "#e9ecef";
            resDiv.style.color = "#333";

            try {
                const genAI = new GoogleGenerativeAI(key);
                // Forzamos el uso del modelo sin prefijos problemáticos
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                const result = await model.generateContent("Di: 'CONEXIÓN EXITOSA'");
                const response = await result.response;
                const text = response.text();

                resDiv.innerHTML = "✅ ¡ESTÁ VIVA!<br><br>Google responde: " + text;
                resDiv.style.backgroundColor = "#d4edda";
                resDiv.style.color = "#155724";
            } catch (error) {
                resDiv.innerHTML = "❌ SIGUE FALLANDO:<br>" + error.message;
                resDiv.style.backgroundColor = "#f8d7da";
                resDiv.style.color = "#721c24";
            }
        };
    </script>
</body>
</html>
