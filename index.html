<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadona Smart v49</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 font-sans text-gray-900">
    <div id="app" class="max-w-md mx-auto"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        
        // 1. Intentar cargar la clave nueva
        let miClave = localStorage.getItem("CLAVE_MAESTRA");

        if (!miClave) {
            miClave = prompt("🔑 PEGA TU NUEVA CLAVE AQUÍ:");
            if (miClave) localStorage.setItem("CLAVE_MAESTRA", miClave);
        }

        const genAI = miClave ? new GoogleGenerativeAI(miClave) : null;
        let logs = [{role: 'ai', text: miClave ? 'v49 lista. Si falla, pulsa el botón rojo de abajo.' : '⚠️ No hay clave.'}];
        let ocupado = false;

        window.preguntarIA = async () => {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if(!texto || ocupado || !genAI) return;

            logs.push({role: 'user', text: texto});
            input.value = ""; ocupado = true; dibujar();

            try {
                // Forzamos el uso del modelo más reciente disponible
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(texto);
                const response = await result.response;
                logs.push({role: 'ai', text: response.text()});
            } catch (e) {
                logs.push({role: 'ai', text: "❌ Error: " + e.message.substring(0, 40) + "... Pulsa REINICIAR abajo."});
            }
            ocupado = false; dibujar();
        };

        window.dibujar = () => {
            document.getElementById('app').innerHTML = `
                <div class="flex flex-col h-[90vh]">
                    <div class="bg-green-700 text-white p-4 rounded-3xl shadow-lg mb-4 text-center font-black uppercase italic tracking-tighter border-b-4 border-green-900">Mercadona v49</div>
                    <div class="flex-1 overflow-y-auto bg-white rounded-3xl p-4 shadow-inner space-y-4 mb-4 border text-[11px] font-bold">
                        ${logs.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="${m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-800'} p-3 rounded-2xl max-w-[85%] shadow-sm">${m.text}</div></div>`).join('')}
                    </div>
                    <div class="flex gap-2 bg-white p-2 rounded-3xl border shadow-xl">
                        <input type="text" id="chat-input" class="flex-1 p-3 outline-none text-xs font-bold" placeholder="Escribe...">
                        <button onclick="preguntarIA()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black shadow-md">OK</button>
                    </div>
                    <button onclick="localStorage.clear(); location.reload();" class="bg-red-50 text-red-500 text-[10px] py-2 mt-4 rounded-xl border border-red-100 font-bold uppercase tracking-widest italic">⚠️ Reiniciar Todo y Nueva Clave</button>
                </div>`;
        };
        window.onload = dibujar;
    </script>
</body>
</html>
