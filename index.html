<!DOCTYPE html>
<html>
<head><title>Ultimo Test</title></head>
<body style="text-align:center; padding:50px;">
    <input type="text" id="k" placeholder="Pega la NUEVA clave" style="width:80%; padding:10px;">
    <button onclick="test()">PROBAR</button>
    <h1 id="r"></h1>
    <script>
        async function test() {
            const key = document.getElementById('k').value;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({contents:[{parts:[{text:'Hola'}]}]})
            });
            const data = await res.json();
            document.getElementById('r').innerText = res.ok ? "✅ FUNCIONA" : "❌ SIGUE EL ERROR";
            console.log(data);
        }
    </script>
</body>
</html>
