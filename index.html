<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de API Key</title>
</head>
<body style="font-family: sans-serif; padding: 20px; text-align: center;">

    <h2>Comprobador de API Key</h2>
    
    <input type="text" id="key-input" placeholder="Pega tu clave aquí" 
           style="width: 80%; padding: 10px; margin-bottom: 10px;">
    <br>
    <button id="btn-test" style="padding: 10px 20px; cursor: pointer;">Probar Clave Ahora</button>

    <div id="resultado" style="margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 8px;"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        document.getElementById('btn-test').onclick = async () => {
            const key = document.getElementById('key-input').value.trim();
            const resDiv = document.getElementById('resultado');
            
            if (!key) {
                resDiv.innerText = "⚠️ Por favor, pega una clave.";
                return;
            }

            resDiv.innerText = "⌛ Probando conexión...";
            resDiv.style.backgroundColor = "#eee";

            try {
                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                // Pedimos una respuesta súper corta para ahorrar tiempo
                const result = await model.generateContent("Responde solo con la palabra: OK");
                const text = result.response.text();

                if (text.includes("OK")) {
                    resDiv.innerText = "✅ ¡FUNCIONA! La clave es correcta y Google responde.";
                    resDiv.style.backgroundColor = "#d4edda";
                    resDiv.style.color = "#155724";
                }
            } catch (error) {
                console.error(error);
                resDiv.innerText = "❌ ERROR: " + error.message;
                resDiv.style.backgroundColor = "#f8d7da";
                resDiv.style.color = "#721c24";
            }
        };
    </script>
</body>
</html>
