<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadona v45 - Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 font-sans">
    <div id="app" class="max-w-md mx-auto"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        
        // Buscamos la clave en la memoria de tu móvil, si no está, la pedimos
        let apiKey = localStorage.getItem("GEMINI_KEY");
        if (!apiKey) {
            apiKey = prompt("Introduce tu API Key de Google (solo se guardará en tu móvil):");
            if (apiKey) localStorage.setItem("GEMINI_KEY", apiKey);
        }

        const genAI = apiKey ? new GoogleGenerativeAI(apiKey) : null;
        let chatLogs = [{role: 'ai', text: genAI ? 'v45 Segura: Clave cargada desde memoria local.' : '⚠️ No hay clave configurada.'}];
        let cargando = false;

        window.preguntarIA = async () => {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg || cargando || !genAI) return;

            chatLogs.push({role: 'user', text: msg});
            input.value = ""; cargando = true; dibujar();

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(msg);
                chatLogs.push({role: 'ai', text: result.response.text()});
            } catch (e) {
                chatLogs.push({role: 'ai', text: "⚠️ Error: Clave incorrecta o bloqueada. Borra los datos del navegador para poner otra."});
            }
            cargando = false; dibujar();
        };

        window.dibujar = () => {
            document.getElementById('app').innerHTML = `
                <div class="flex flex-col h-[90vh]">
                    <div class="bg-indigo-700 text-white p-4 rounded-3xl shadow-lg mb-4 text-center font-black uppercase italic tracking-tighter">Mercadona v45 (Vault)</div>
                    <div class="flex-1 overflow-y-auto bg-white rounded-3xl p-4 shadow-inner space-y-4 mb-4 border text-[11px] font-bold">
                        ${chatLogs.map(m => `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}"><div class="${m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-800'} p-3 rounded-2xl max-w-[85%] shadow-sm">${m.text}</div></div>`).join('')}
                    </div>
                    <div class="flex gap-2 bg-white p-2 rounded-3xl border shadow-xl">
                        <input type="text" id="chat-input" class="flex-1 p-3 outline-none text-xs font-bold" placeholder="Escribe algo...">
                        <button onclick="preguntarIA()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black">OK</button>
                    </div>
                    <button onclick="localStorage.clear(); location.reload();" class="text-[10px] text-gray-400 mt-2 underline italic">Borrar clave de este móvil</button>
                </div>`;
        };
        window.onload = dibujar;
    </script>
</body>
</html>
