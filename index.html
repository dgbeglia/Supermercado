<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Final API</title>
</head>
<body style="font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f9;">

    <h2>Probador Directo (Sin Librerías)</h2>
    <p style="color: #666;">Si este falla, el problema es la clave. Si este funciona, el problema era la librería.</p>
    
    <input type="text" id="key-input" placeholder="Pega tu API Key aquí" 
           style="width: 90%; padding: 15px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 15px;">
    <br>
    <button id="btn-test" style="padding: 15px 30px; background: #000; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">
        PROBAR CONEXIÓN DIRECTA
    </button>

    <div id="resultado" style="margin-top: 25px; padding: 20px; border-radius: 10px; font-size: 14px; white-space: pre-wrap;"></div>

    <script>
        document.getElementById('btn-test').onclick = async () => {
            const key = document.getElementById('key-input').value.trim();
            const resDiv = document.getElementById('resultado');
            
            if (!key) { resDiv.innerText = "⚠️ Pega la clave."; return; }

            resDiv.innerText = "⌛ Intentando conexión directa con Google v1...";
            resDiv.style.backgroundColor = "#eee";

            try {
                // Llamada directa a la API de Google sin intermediarios
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Responde solo: OK" }] }]
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    resDiv.innerHTML = "✅ ¡CONEXIÓN DIRECTA EXITOSA!<br><br>Respuesta: " + data.candidates[0].content.parts[0].text;
                    resDiv.style.backgroundColor = "#d4edda";
                    resDiv.style.color = "#155724";
                } else {
                    resDiv.innerHTML = "❌ ERROR DE GOOGLE:<br>" + JSON.stringify(data, null, 2);
                    resDiv.style.backgroundColor = "#f8d7da";
                    resDiv.style.color = "#721c24";
                }
            } catch (error) {
                resDiv.innerText = "❌ ERROR DE RED: " + error.message;
            }
        };
    </script>
</body>
</html>
