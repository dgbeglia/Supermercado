<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadona Smart v19</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">
    <meta name="theme-color" content="#15803d">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfifQBtUNLbUkD8r_aRZBfv7fOStpVkjo",
            authDomain: "supermercado-3e981.firebaseapp.com",
            databaseURL: "https://supermercado-3e981-default-rtdb.firebaseio.com",
            projectId: "supermercado-3e981",
            storageBucket: "supermercado-3e981.firebasestorage.app",
            messagingSenderId: "1012881433414",
            appId: "1:1012881433414:web:db2c2e235efe4862a1bb47"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const PIN_CORRECTO = "20102017"; 
        let autorizado = localStorage.getItem('app_autorizada') === 'true';
        let presupuestoMax = parseFloat(localStorage.getItem('presupuesto_max')) || 100;

        let localData = {}; 
        let historialData = {};
        let vista = 'HOME';
        let catActual = "";
        let tipoInforme = 'DETALLADO'; 
        let expandidos = new Set();
        let filtroBusqueda = "";

        let fechaDesde = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T');
        let fechaHasta = new Date().toISOString().split('T');

        const SEMILLA = ["CONSERVAS", "BEBIDAS", "CARNES Y CONGELADOS", "PANIFICADOS", "LIMPIEZA", "FRIOS", "HIGIENE", "ESPECIAS", "FRUTA Y VERDURA", "MASCOTAS"];

        if (autorizado) {
            onValue(ref(db, 'mercadona'), (snap) => { localData = snap.val() || {}; dibujar(); });
            onValue(ref(db, 'historial'), (snap) => { historialData = snap.val() || {}; dibujar(); });
        }

        window.verificarPIN = () => {
            const pinIngresado = document.getElementById('pin-input').value;
            if (pinIngresado === PIN_CORRECTO) {
                localStorage.setItem('app_autorizada', 'true');
                location.reload();
            } else { alert("PIN incorrecto"); }
        };

        window.ajustarPresupuesto = () => {
            const nuevo = prompt("Establecer presupuesto semanal (&euro;):", presupuestoMax);
            if (nuevo && !isNaN(nuevo)) {
                presupuestoMax = parseFloat(nuevo);
                localStorage.setItem('presupuesto_max', presupuestoMax);
                dibujar();
            }
        };

        window.filtrar = (val) => { 
            filtroBusqueda = val.toLowerCase(); 
            dibujar();
            const input = document.getElementById('search-input');
            if(input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
        };

        function obtenerGastoSemanalAcumulado() {
            const hoy = new Date();
            const diaSemana = hoy.getDay(); 
            const diff = hoy.getDate() - diaSemana + (diaSemana === 0 ? -6 : 1); 
            const lunesActual = new Date(hoy.setDate(diff)).setHours(0,0,0,0);
            let acumulado = 0;
            Object.values(historialData).forEach(item => {
                if (item.date >= lunesActual) acumulado += (parseFloat(item.price) * parseInt(item.qty));
            });
            return acumulado;
        }

        window.toggleExpandir = (id) => {
            if (expandidos.has(id)) expandidos.delete(id);
            else expandidos.add(id);
            dibujar();
        };

        window.irA = (v, c="") => { vista = v; catActual = c; filtroBusqueda = ""; expandidos.clear(); dibujar(); };
        window.setTipoInforme = (t) => { tipoInforme = t; expandidos.clear(); dibujar(); };
        window.cambiarFecha = (id, val) => { if(id==='desde') fechaDesde = val; else fechaHasta = val; dibujar(); };

        window.confirmarProducto = (id, e) => {
    e.stopPropagation();
    const i = localData[id];
    
    // 1. Enviamos al historial inmediatamente (esto actualiza la barra al instante)
    push(ref(db, 'historial'), { 
        name: i.name, 
        price: parseFloat(i.price) || 0, 
        qty: i.qty || 1, 
        date: Date.now(), 
        cat: i.cat || "VARIOS"
    });

    // 2. Lo marcamos como confirmado y lo sacamos de la lista activa de la compra
    // para que no haya duplicados en la interfaz
    update(ref(db, 'mercadona/' + id), { 
        confirmed: true,
        bought: false // Al ponerlo en false, deja de sumar en totalCestaActual
    });
};

  

        window.finalizarCompra = () => {
            if(confirm("&iquest;Finalizar y guardar en historial?")){
                const updates = {};
                Object.keys(localData).forEach(id => {
                    if(localData[id].confirmed) {
                        updates[id + '/bought'] = false;
                        updates[id + '/confirmed'] = false;
                        updates[id + '/qty'] = 1;
                    }
                });
                update(ref(db, 'mercadona'), updates);
                irA('HOME');
            }
        };

        window.toggle = (id) => {
            const i = localData[id];
            const nb = !i.bought;
            update(ref(db, 'mercadona/' + id), { bought: nb, confirmed: false, qty: nb ? (i.qty || 1) : 1 });
        };

        window.sumar = (id, n, e) => { e.stopPropagation(); update(ref(db, 'mercadona/' + id), { qty: Math.max(1, (localData[id].qty || 1) + n) }); };
        window.actPrecio = (id, p) => update(ref(db, 'mercadona/' + id), { price: parseFloat(p) || 0 });
        window.eliminarProducto = (id, e) => { e.stopPropagation(); if(confirm("&iquest;Borrar?")) remove(ref(db, 'mercadona/' + id)); };
        window.editarNombre = (id, e) => { e.stopPropagation(); const n = prompt("Nombre:", localData[id].name); if(n) update(ref(db, 'mercadona/' + id), { name: n }); };
        window.agregarProducto = () => { const n = prompt("Nuevo producto:"); if(n) set(ref(db, 'mercadona/prod_'+Date.now()), { name: n, cat: catActual, bought: false, confirmed: false, qty: 1, price: 0 }); };

        function dibujar() {
            const root = document.getElementById('app');
            if (!root) return;
            if (!autorizado) {
                root.innerHTML = `<div class="flex flex-col items-center justify-center min-h-[80vh] text-center p-6"><h1 class="text-2xl font-black text-green-700 mb-6 italic uppercase tracking-tighter">Mercadona Smart</h1><div class="bg-white p-8 rounded-3xl shadow-xl border w-full max-w-xs text-center"><p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Introduce tu PIN</p><input type="password" id="pin-input" inputmode="numeric" class="w-full text-center text-3xl p-3 border-2 rounded-2xl mb-4 outline-none border-gray-100 focus:border-green-500"><button onclick="verificarPIN()" class="w-full bg-green-600 text-white p-4 rounded-2xl font-black shadow-lg">ENTRAR</button></div></div>`;
                return;
            }

            let html = "";
            if (vista === 'HOME') {
                const total = Object.values(localData).filter(i => i.bought).length;
                html = `<h1 class="text-3xl font-black text-center text-green-700 my-6 italic uppercase tracking-tighter">Mercadona</h1>
                        <button onclick="irA('RESUMEN')" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-bold mb-4 flex justify-between shadow-lg"><span> MI LISTA</span><span>${total}</span></button>
                        <button onclick="irA('INFORMES')" class="w-full bg-purple-600 text-white p-4 rounded-3xl font-bold mb-6 shadow-md text-[10px] uppercase tracking-widest"> Gastos e Informes</button>
                        <div class="grid gap-2">`;
                SEMILLA.forEach(cat => {
                    const n = Object.values(localData).filter(i => i && i.cat === cat && i.bought).length;
                    html += `<button onclick="irA('CAT', '${cat}')" class="bg-white p-5 rounded-2xl flex justify-between border-2 border-gray-50 font-bold text-gray-400 uppercase text-[10px] tracking-widest"><span>${cat}</span><span class="${n>0?'text-green-500':'text-gray-200'}">${n>0?n:''}</span></button>`;
                });
                html += `</div>`;
            } 
            else if (vista === 'CAT') {
                html = `<div class="sticky top-0 bg-gray-50 pt-2 pb-4 z-10">
                            <div class="flex items-center gap-3 mb-3"><button onclick="irA('HOME')" class="bg-white w-12 h-12 rounded-2xl border text-xl flex items-center justify-center font-black shadow-sm">&lt;</button><h2 class="flex-1 bg-green-700 text-white p-3 rounded-2xl font-black text-center uppercase text-xs">${catActual}</h2><button onclick="agregarProducto()" class="bg-green-600 text-white w-12 h-12 rounded-2xl font-black text-2xl shadow-sm">+</button></div>
                            <input type="text" id="search-input" placeholder="Buscar producto..." oninput="filtrar(this.value)" class="w-full p-4 rounded-2xl border-2 border-white outline-none font-bold text-sm shadow-sm" value="${filtroBusqueda}">
                        </div>`;
                Object.keys(localData).filter(id => localData[id].cat === catActual && localData[id].name.toLowerCase().includes(filtroBusqueda)).sort((a,b)=>localData[a].name.localeCompare(localData[b].name)).forEach(id => {
                    const i = localData[id]; const b = i.bought;
                    html += `<div class="flex items-center gap-2 p-3 bg-white rounded-2xl border-2 ${b?'border-green-500 bg-green-50': 'border-transparent'} mb-2 shadow-sm" onclick="toggle('${id}')">
                                <button onclick="eliminarProducto('${id}', event)" class="text-red-300 w-8 h-8 font-bold border rounded-lg">X</button>
                                <button onclick="editarNombre('${id}', event)" class="text-blue-300 w-8 h-8 font-bold border rounded-lg text-[10px]">E</button>
                                <div class="flex-1 font-bold text-xs ${b?'text-green-800':'text-gray-700'}">${i.name}</div>
                                ${b ? `<div class="flex items-center gap-1" onclick="event.stopPropagation()"><input type="number" step="0.01" value="${i.price||0}" onchange="actPrecio('${id}', this.value)" class="w-14 p-1 border rounded text-[10px] text-center font-black text-green-600"><div class="flex items-center bg-gray-100 rounded-lg border"><button onclick="sumar('${id}', -1, event)" class="px-2 font-black text-red-500">-</button><span class="px-1 text-[11px] font-black">${i.qty || 1}</span><button onclick="sumar('${id}', 1, event)" class="px-2 font-black text-green-600">+</button></div></div>` : ''}
                            </div>`;
                });
            }
            else if (vista === 'RESUMEN') {
                let totalCestaActual = 0;
                Object.values(localData).filter(i => i.bought).forEach(i => totalCestaActual += (parseFloat(i.price) || 0) * (parseInt(i.qty) || 1));
                const totalSemanaReal = obtenerGastoSemanalAcumulado();
                const porcentaje = Math.min((totalSemanaReal / presupuestoMax) * 100, 100);

                html = `<div class="sticky top-0 bg-gray-50 py-2 z-10">
                            <div class="flex items-center gap-3 mb-2"><button onclick="irA('HOME')" class="bg-white w-12 h-12 rounded-2xl border text-xl flex items-center justify-center font-black shadow-sm">&lt;</button><div class="flex-1 bg-green-700 text-white p-3 rounded-2xl font-black text-center uppercase text-sm italic shadow-md text-[11px]">TOTAL CESTA: ${totalCestaActual.toFixed(2)} &euro;</div></div>
                            <div class="bg-white p-3 rounded-2xl border shadow-sm mb-4">
                                <div class="flex justify-between items-center mb-1 px-1"><span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Gasto Semanal Acumulado</span><button onclick="ajustarPresupuesto()" class="text-[9px] font-black text-blue-500 uppercase">L&iacute;mite: ${presupuestoMax}&euro;</button></div>
                                <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden border"><div class="h-full transition-all duration-500 ${totalSemanaReal > presupuestoMax ? 'bg-red-500' : 'bg-green-500'}" style="width: ${porcentaje}%"></div></div>
                                <div class="flex justify-between mt-1 px-1"><span class="text-[9px] font-bold ${totalSemanaReal > presupuestoMax ? 'text-red-500' : 'text-green-600'} uppercase">Llevas: ${totalSemanaReal.toFixed(2)}&euro;</span></div>
                            </div>
                        </div>
                        <button onclick="finalizarCompra()" class="w-full bg-blue-600 text-white p-4 rounded-3xl font-black mb-6 shadow-md">FINALIZAR COMPRA</button>`;
                SEMILLA.forEach(cat => {
                    const itemsCat = Object.keys(localData).filter(id => localData[id].bought && localData[id].cat === cat);
                    if(itemsCat.length > 0) {
                        html += `<div class="mb-6"><h3 class="text-[10px] font-black text-gray-400 mb-2 ml-2 tracking-widest uppercase">${cat}</h3>`;
                        itemsCat.forEach(id => {
                            const i = localData[id];
                            html += `<div class="flex justify-between items-center p-4 bg-white rounded-2xl mb-2 border-l-8 ${i.confirmed?'border-green-500':'border-orange-400'} shadow-sm">
                                        <div class="flex-1"><div class="font-bold text-xs uppercase text-gray-700">${i.name}</div><div class="text-[10px] text-gray-400 font-bold">${i.qty} ud x ${(parseFloat(i.price)||0).toFixed(2)} &euro;</div></div>
                                        <div class="flex gap-2"><button onclick="toggle('${id}')" class="text-red-400 font-bold p-2 text-[10px] border rounded-lg italic">QUITAR</button>${!i.confirmed ? `<button onclick="confirmarProducto('${id}', event)" class="bg-green-500 text-white px-3 py-2 rounded-xl text-[10px] font-bold shadow-md">CONFIRMO</button>` : `<span class="text-green-600 font-black p-2 text-[10px] italic uppercase">COMPRADO</span>`}</div></div>`;
                        });
                        html += `</div>`;
                    }
                });
            }
            else if (vista === 'INFORMES') {
                const start = new Date(fechaDesde).setHours(0,0,0,0);
                const end = new Date(fechaHasta).setHours(23,59,59,999);
                const comprasRango = Object.values(historialData).filter(i => i && i.date >= start && i.date <= end);
                let totalRango = comprasRango.reduce((a, b) => a + (parseFloat(b.price) * parseInt(b.qty)), 0);

                html = `<div class="flex items-center gap-3 mb-4 sticky top-0 bg-gray-50 py-2 z-10"><button onclick="irA('HOME')" class="bg-white w-12 h-12 rounded-2xl border text-xl flex items-center justify-center font-black shadow-sm">&lt;</button><h2 class="flex-1 bg-purple-700 text-white p-3 rounded-2xl font-black text-center uppercase text-xs italic">Reportes</h2></div>
                        <div class="bg-white p-4 rounded-3xl mb-4 border shadow-sm grid grid-cols-2 gap-3 text-center">
                            <div><label class="text-[9px] font-black text-gray-400 uppercase block mb-1">Desde</label><input type="date" value="${fechaDesde}" onchange="cambiarFecha('desde', this.value)" class="w-full p-2 border rounded-xl text-xs font-bold text-purple-700 bg-purple-50"></div>
                            <div><label class="text-[9px] font-black text-gray-400 uppercase block mb-1">Hasta</label><input type="date" value="${fechaHasta}" onchange="cambiarFecha('hasta', this.value)" class="w-full p-2 border rounded-xl text-xs font-bold text-purple-700 bg-purple-50"></div>
                        </div>
                        <div class="bg-purple-600 p-4 rounded-3xl mb-4 text-center text-white shadow-md"><div class="text-[9px] font-bold uppercase opacity-70 tracking-widest mb-1">Gasto Total en Rango</div><div class="text-3xl font-black">${totalRango.toFixed(2)} &euro;</div></div>
                        <div class="flex gap-1 mb-4 bg-gray-200 p-1 rounded-2xl">
                            <button onclick="setTipoInforme('DETALLADO')" class="flex-1 py-2 rounded-xl text-[8px] font-black uppercase ${tipoInforme==='DETALLADO'?'bg-white shadow-sm text-purple-700':'text-gray-500'}">Producto Detallado</button>
                            <button onclick="setTipoInforme('RESUMEN')" class="flex-1 py-2 rounded-xl text-[8px] font-black uppercase ${tipoInforme==='RESUMEN'?'bg-white shadow-sm text-purple-700':'text-gray-500'}">Producto Resumen</button>
                            <button onclick="setTipoInforme('RUBRO')" class="flex-1 py-2 rounded-xl text-[8px] font-black uppercase ${tipoInforme==='RUBRO'?'bg-white shadow-sm text-purple-700':'text-gray-500'}">Por Rubro</button>
                        </div>`;

                if(tipoInforme === 'DETALLADO') {
                    const dias = {};
                    comprasRango.forEach(i => {
                        const d = new Date(i.date).toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
                        if(!dias[d]) dias[d] = { total: 0, items: [] };
                        dias[d].total += (i.price * i.qty);
                        dias[d].items.push(i);
                    });
                    Object.keys(dias).sort((a,b) => b.split('/').reverse().join('') - a.split('/').reverse().join('')).forEach(fecha => {
                        const idExp = 'det_'+fecha;
                        html += `<div class="mb-2 bg-white rounded-2xl border shadow-sm overflow-hidden">
                                    <div onclick="toggleExpandir('${idExp}')" class="p-4 flex justify-between items-center bg-gray-50">
                                        <div><span class="text-[10px] font-black text-purple-600 uppercase">D&iacute;a: ${fecha}</span></div>
                                        <div class="text-right font-black text-xs text-gray-700">${dias[fecha].total.toFixed(2)} &euro; ${expandidos.has(idExp)?'':''}</div>
                                    </div>`;
                        if(expandidos.has(idExp)){
                            html += `<div class="p-2 divide-y border-t">`;
                            dias[fecha].items.forEach(p => {
                                html += `<div class="p-2 flex justify-between text-[10px] uppercase font-bold text-gray-500"><span>${p.name} (${p.qty})</span><span>${(p.price*p.qty).toFixed(2)}&euro;</span></div>`;
                            });
                            html += `</div>`;
                        }
                        html += `</div>`;
                    });
                } 
                else if(tipoInforme === 'RESUMEN') {
                    const productos = {};
                    comprasRango.forEach(i => {
                        if(!productos[i.name]) productos[i.name] = { qty: 0, total: 0, dates: [] };
                        productos[i.name].qty += parseInt(i.qty);
                        productos[i.name].total += (i.price * i.qty);
                        productos[i.name].dates.push({d: new Date(i.date).toLocaleDateString(), q: i.qty, p: i.price*i.qty});
                    });
                    Object.keys(productos).sort((a,b) => productos[b].total - productos[a].total).forEach(p => {
                        const idExp = 'res_'+p;
                        html += `<div class="mb-2 bg-white rounded-2xl border shadow-sm overflow-hidden">
                                    <div onclick="toggleExpandir('${idExp}')" class="p-4 flex justify-between items-center">
                                        <span class="text-[10px] font-black text-gray-700 uppercase">${p} (x${productos[p].qty})</span>
                                        <span class="font-black text-xs text-purple-600">${productos[p].total.toFixed(2)} &euro; ${expandidos.has(idExp)?'':''}</span>
                                    </div>`;
                        if(expandidos.has(idExp)){
                            html += `<div class="p-2 bg-gray-50 border-t">`;
                            productos[p].dates.forEach(fecha => {
                                html += `<div class="flex justify-between text-[9px] font-bold text-gray-400 p-1"><span> ${fecha.d}</span><span>${fecha.q} ud - ${fecha.p.toFixed(2)}&euro;</span></div>`;
                            });
                            html += `</div>`;
                        }
                        html += `</div>`;
                    });
                } 
                else {
                    const rubros = {};
                    comprasRango.forEach(i => {
                        const r = i.cat || "VARIOS";
                        if(!rubros[r]) rubros[r] = { total: 0, count: 0, items: [] };
                        rubros[r].total += (i.price * i.qty);
                        rubros[r].count += parseInt(i.qty);
                        rubros[r].items.push(i);
                    });
                    Object.keys(rubros).sort((a,b) => rubros[b].total - rubros[a].total).forEach(r => {
                        const idExp = 'rub_'+r;
                        html += `<div class="mb-2 bg-white rounded-2xl border shadow-sm overflow-hidden">
                                    <div onclick="toggleExpandir('${idExp}')" class="p-4 flex justify-between items-center bg-green-50">
                                        <span class="text-[10px] font-black text-green-700 uppercase">${r}</span>
                                        <span class="font-black text-xs text-purple-700">${rubros[r].total.toFixed(2)} &euro; ${expandidos.has(idExp)?'':''}</span>
                                    </div>`;
                        if(expandidos.has(idExp)){
                            html += `<div class="p-2 divide-y border-t">`;
                            rubros[r].items.forEach(p => {
                                html += `<div class="p-2 flex justify-between text-[9px] uppercase font-bold text-gray-500"><span>${p.name} (x${p.qty})</span><span>${(p.price*p.qty).toFixed(2)}&euro;</span></div>`;
                            });
                            html += `</div>`;
                        }
                        html += `</div>`;
                    });
                }
            }
            root.innerHTML = html;
        }
        window.onload = dibujar;
    </script>
</head>
<body class="bg-gray-50 p-4 min-h-screen font-sans">
    <div id="app" class="max-w-md mx-auto pb-10"></div>
</body>
</html>
